branding:
  logo-text: C
  app-name: Chris's Dashboard
  hide-footer: true

theme:
  !include: theme-Teal-City.yml
pages:
  - name: Home
    width: wide
    columns:
      - size: full
        widgets:
          - type: clock
            hour-format: 24h
            timezones:
              - timezone: UTC
                label: UTC
              - timezone: Asia/Tokyo
                label: Tokyo
              - timezone: America/New_York
                label: New York
              - timezone: America/Los_Angeles
                label: LA
          - type: calendar
            first-day-of-week: monday
      - size: full
        widgets:
          - type: weather
            location: Taipei, Taiwan
            units: metric
            hour-format: 24h
  - name: Search
    hide-desktop-navigation: false
    center-vertically: true
    columns:
      - size: full
        widgets:
          - type: search
            autofocus: true
            search-engine: google
            bangs:
              - title: YouTube
                shortcut: "!yt"
                url: https://www.youtube.com/results?search_query={QUERY}
              - title: GitHub
                shortcut: "!gh"
                url: https://github.com/search?q={QUERY}
              - title: Reddit
                shortcut: "!r"
                url: https://www.reddit.com/search/?q={QUERY}
              - title: Google Maps
                shortcut: "!map"
                url: https://www.google.com/maps/search/{QUERY}
          - type: bookmarks
            groups:
              - title: General
                links:
                  - title: Google
                    url: https://www.google.com/
                  - title: Helper Scripts
                    url: https://github.com/community-scripts/ProxmoxVE
  !include: page-investment.yml
  !include: page-rss.yml
  !include: page-dev.yml
  !include: page-homelab.yml
  !include: page-youtube.yml
