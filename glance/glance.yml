branding:
  logo-text: C
  app-name: Chris's Dashboard
  hide-footer: true

theme:
  !include: theme-Teal-City.yml
pages:
  - name: Home
    width: wide
    columns:
      - size: small
        widgets:
          - type: clock
            hour-format: 24h
            timezones:
