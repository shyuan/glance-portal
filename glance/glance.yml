                label: UTC
              - timezone: Asia/Tokyo
                label: Tokyo
              - timezone: America/New_York
                label: New York
              - timezone: America/Los_Angeles
                label: LA
          - type: calendar
            first-day-of-week: monday
          - type: weather
            location: Taipei, Taiwan
            units: metric
            hour-format: 24h
